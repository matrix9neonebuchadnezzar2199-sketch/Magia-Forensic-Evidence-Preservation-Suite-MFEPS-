name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src tests

  unit-test:
    needs: lint
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit + CFTT tests
        run: >
          pytest tests/
          -m "not e2e"
          --cov=src
          --cov-config=.coveragerc
          --cov-report=xml:coverage.xml
          --cov-report=term-missing
          --cov-fail-under=80
          --junitxml=test-results.xml
          -v --tb=short
        env:
          MFEPS_OUTPUT_DIR: ./test_output
          MFEPS_LOG_LEVEL: DEBUG
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml

  e2e-test:
    needs: lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
      - name: Run E2E tests
        run: >
          pytest tests/e2e/
          -m e2e
          --junitxml=e2e-results.xml
          -v --tb=short
        env:
          MFEPS_OUTPUT_DIR: ./test_output
          MFEPS_LOG_LEVEL: WARNING
          MFEPS_E2E_ADMIN_PASSWORD: "CITestAdmin123!"
          MFEPS_STORAGE_SECRET: "ci-e2e-secret"
      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e-results.xml

  coverage-badge:
    needs: unit-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: coverage-py3.12
      - name: Generate badge
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          output: both
      - name: Upload badge
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: code-coverage-results.md
